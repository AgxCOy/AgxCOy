name: 更新博客友链

on:
  issues:
    types:
      - opened
      - edited
      # - closed
      # - reopened

jobs:
  validate_issue:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: AgxCOy
      REPO: blogs
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    permissions:
      issues: write
    steps:
      - name: 签出仓库
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: 搭建环境
        run: pnpm install && pnpm -r build

      - name: 检查 Issue
        id: check
        uses: ./.github/actions/check

      - name: 递交友链信息
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.BLOGS_PAT }}
        run: |-
          $payload = @{
            event_type     = "bloglink-request"
            client_payload = @{
                ISSUE_NUMBER = '${{ github.event.issue.number }}'
                LINK         = '${{ steps.check.outputs.links }}'
                MSG          = '${{ steps.check.outputs.message }}'
                PR_OPTS      = '${{ steps.check.outputs.pr-data }}'
            }
          }
          $payload | ConvertTo-Json -Depth 3 | gh api /repos/AgxCOy/blogs/dispatches --input -

      - name: 评论 :)
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.issue.number;
            const {owner, repo} = context.repo;
            const body = "🎉 已创建合并请求！合并后将自动生效。";
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number }
            );
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('🎉'));
            
            if (botComment) {
              await github.rest.issues.updateComment({owner, repo, comment_id: botComment.id, body});
              console.log(`已更新评论 #${botComment.id}`);
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
              console.log('已创建新评论');
            }
