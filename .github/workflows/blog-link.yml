name: 更新博客友链

on:
  issues:
    types:
      - opened
      - edited
      # - closed
      # - reopened

jobs:
  validate_issue:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: AgxCOy
      REPO: blogs
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    permissions:
      issues: write
    steps:
      - name: 签出仓库
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: 搭建环境
        run: pnpm install && pnpm -r build

      - name: 检查 Issue
        id: check
        uses: ./.github/actions/check

      - name: 递交友链信息
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/AgxCOy/blogs/dispatches \
            -d '{
              "event_type": "bloglink-request",
              "client_payload": {
                "ISSUE_NUMBER": ${{ github.event.issue.number }},
                "LINK": ${{ steps.check.outputs.links }},
                "MSG": ${{ steps.check.outputs.message }},
                "PR_OPTS": ${{ steps.check.outputs.pr-data }}
              }
            }'

      - name: Comment Issue on PR Created
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "🎉 已提交友链申请！可以去 [AgxCOy/blogs](https://github.com/AgxCOy/blogs/pulls) 看看进展喵。"
            });
